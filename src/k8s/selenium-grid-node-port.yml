---
# Selenium Grid Hub Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: selenium-hub
  labels:
    app: selenium-hub
spec:
  replicas: 1
  selector:
    matchLabels:
      app: selenium-hub
  template:
    metadata:
      labels:
        app: selenium-hub
    spec:
      containers:
      - name: selenium-hub
        image: selenium/hub:4.0.0  # Adjust version as needed
        ports:
        - containerPort: 4444
---
# Selenium Grid Hub Service (ClusterIP)
apiVersion: v1
kind: Service
metadata:
  name: selenium-hub
spec:
  type: NodePort
  selector:
    app: selenium-hub
  sessionAffinity: None
  ports:
    - protocol: TCP
      port: 4444
      targetPort: 4444
      name: hub
      nodePort: 32444  # Port between 30000 and 32767
    - protocol: TCP
      port: 4443
      targetPort: 4443
      name: event-bus-publish
    - protocol: TCP
      port: 4442
      targetPort: 4442
      name: event-bus-subscribe
---
# Selenium Node - Chrome Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: selenium-node-chrome
  labels:
    app: selenium-node-chrome
spec:
  replicas: 1
  selector:
    matchLabels:
      app: selenium-node-chrome
  template:
    metadata:
      labels:
        app: selenium-node-chrome
    spec:
      containers:
      - name: selenium-node-chrome
        image: selenium/node-chrome:4.0.0
        env:
        - name: HUB_HOST
          value: "selenium-hub"
        - name: HUB_PORT
          value: "4444"
        - name: SE_EVENT_BUS_HOST
          value: "selenium-hub"
        - name: SE_EVENT_BUS_PUBLISH_PORT
          value: "4442"
        - name: SE_EVENT_BUS_SUBSCRIBE_PORT
          value: "4443"
        ports:
        - containerPort: 5555

---
# Selenium Node - Firefox Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: selenium-node-firefox
  labels:
    app: selenium-node-firefox
spec:
  replicas: 1
  selector:
    matchLabels:
      app: selenium-node-firefox
  template:
    metadata:
      labels:
        app: selenium-node-firefox
    spec:
      containers:
      - name: selenium-node-firefox
        image: selenium/node-firefox:4.0.0
        env:
        - name: HUB_HOST
          value: "selenium-hub"
        - name: HUB_PORT
          value: "4444"
        - name: SE_EVENT_BUS_HOST
          value: "selenium-hub"
        - name: SE_EVENT_BUS_PUBLISH_PORT
          value: "4442"
        - name: SE_EVENT_BUS_SUBSCRIBE_PORT
          value: "4443"
        ports:
        - containerPort: 5555

---
# Selenium Node - Edge Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: selenium-node-edge
  labels:
    app: selenium-node-edge
spec:
  replicas: 5
  selector:
    matchLabels:
      app: selenium-node-edge
  template:
    metadata:
      labels:
        app: selenium-node-edge
    spec:
      containers:
      - name: selenium-node-edge
        image: selenium/node-edge:4.0.0
        env:
        - name: HUB_HOST
          value: "selenium-hub"
        - name: HUB_PORT
          value: "4444"
        - name: SE_EVENT_BUS_HOST
          value: "selenium-hub"
        - name: SE_EVENT_BUS_PUBLISH_PORT
          value: "4442"
        - name: SE_EVENT_BUS_SUBSCRIBE_PORT
          value: "4443"
        - name: SE_NODE_MAX_SESSIONS
          value: "5"
        - name: SE_NODE_OVERRIDE_MAX_SESSIONS
          value: "true"
        - name: SE_NODE_STEREOTYPE_EXTRA
          value: '{"ms:edgeOptions": {"args": ["--headless"]}}'
        ports:
        - containerPort: 5555